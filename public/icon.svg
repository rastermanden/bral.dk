  <!-- decorative dot ring -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="#3c352d" stroke-width="1.8" stroke-dasharray="1.8 9.4" opacity="0.78" />
  <!-- thin concentric hairline -->
  <circle cx="256" cy="256" r="205" fill="none" stroke="#3c352d" stroke-width="0.6" opacity="0.28" />

  <!-- numeral 1 — engraved effect via offset shadow + main stroke -->
  <g>
    <text x="258" y="300" text-anchor="middle" font-family="Instrument Serif, Georgia, serif" font-size="260" fill="#f4efe4" opacity="0.55" style="letter-spacing:-0.03em">1</text>
    <text x="256" y="298" text-anchor="middle" font-family="Instrument Serif, Georgia, serif" font-size="260" fill="#1f1c18" style="letter-spacing:-0.03em">1</text>
  </g>

  <!-- arc legend: BANCO · BRAL (top), UNUM BRAL (bottom) -->
  <text font-family="JetBrains Mono, Courier New, monospace" font-size="30" fill="#1f1c18" letter-spacing="6" font-weight="600">
    <textPath href="#arc-top" startOffset="50%" text-anchor="middle">BANCO · BRAL</textPath>
  </text>
  <text font-family="JetBrains Mono, Courier New, monospace" font-size="26" fill="#1f1c18" letter-spacing="6" font-weight="500" opacity="0.8">
    <textPath href="#arc-bot" startOffset="50%" text-anchor="middle">· UNUM BRAL · A.D. 2024 ·</textPath>
  </text>

  <!-- rim darkening -->
  <circle cx="256" cy="256" r="256" fill="url(#rim)" />
  <!-- inner vignette -->
  <circle cx="256" cy="256" r="225" fill="url(#vignette)" />

  <!-- primary specular highlight -->
  <ellipse cx="178" cy="140" rx="120" ry="46" fill="#fff" opacity="0.28" filter="url(#soft)" />
  <!-- secondary glint -->
  <ellipse cx="360" cy="380" rx="60" ry="16" fill="#fff" opacity="0.10" filter="url(#soft)" />
  <!-- crescent highlight along top-left edge -->
  <path d="M 72 220 A 200 200 0 0 1 232 66" fill="none" stroke="#fff" stroke-width="6" opacity="0.22" filter="url(#soft)" />
