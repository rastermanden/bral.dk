<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Banco Bral — One Bral coin">
  <defs>
    <!-- body gradient: brushed aluminum with warm core -->
    <radialGradient id="body" cx="38%" cy="30%" r="78%">
      <stop offset="0%"   stop-color="#fbf9f3" />
      <stop offset="30%"  stop-color="#e3ded3" />
      <stop offset="62%"  stop-color="#c9c5be" />
      <stop offset="88%"  stop-color="#8a857b" />
      <stop offset="100%" stop-color="#5a564f" />
    </radialGradient>
    <!-- inner field gradient -->
    <radialGradient id="field" cx="50%" cy="48%" r="58%">
      <stop offset="0%"   stop-color="#e5e0d5" />
      <stop offset="55%"  stop-color="#cdc8c0" />
      <stop offset="100%" stop-color="#9c9890" />
    </radialGradient>
    <!-- edge rim (darker outer ring) -->
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="92%"  stop-color="#3c3832" stop-opacity="0" />
      <stop offset="98%"  stop-color="#3c3832" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#1a1714" stop-opacity="0.9" />
    </radialGradient>
    <!-- subtle inner vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
      <stop offset="70%"  stop-color="#000" stop-opacity="0" />
      <stop offset="100%" stop-color="#1a1714" stop-opacity="0.35" />
    </radialGradient>
    <!-- bottom shadow, warming the lower half -->
    <linearGradient id="warm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#000" stop-opacity="0" />
      <stop offset="100%" stop-color="#3a2a18" stop-opacity="0.18" />
    </linearGradient>
    <!-- specular highlight blur -->
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
    <!-- arc paths for legend -->
    <path id="arc-top" d="M 44 256 A 212 212 0 0 1 468 256" />
    <path id="arc-bot" d="M 468 256 A 212 212 0 0 1 44 256" />
  </defs>

  <!-- reeded edge (128 ticks for clean density) -->
  <g stroke="#4e4a42" stroke-width="1.4" stroke-linecap="butt">
    <g id="reeds">
      <!-- generated via symmetry below -->
    </g>
  </g>
  <!-- 96 reeds, each a short radial line between r=246 and r=254 -->
  <g>
    <!-- using transform-origin rotations -->
    <g fill="none" stroke="#55514a" stroke-width="1.2">
      <!-- we draw 96 lines by hand via rotate transforms on a group -->
    </g>
  </g>

  <!-- Reeded edge: 96 ticks, drawn via <line> with rotate group -->
